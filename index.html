<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kat's O-Boutique — Est. 2020</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* --- KEEPING ALL YOUR ORIGINAL CSS VARIABLES --- */
:root {
  --sky: #b8dff0; --sky-light: #d6eef9; --blush: #f5c8d8;
  --blush-deep: #e8a0bc; --blush-mid: #f0b4cb; --lavender: #d8c8f0;
  --mint: #b8e8d4; --butter: #f8e8b0; --ink: #2a1a2e;
  --white: #fdfaff; --chrome-hi: #fdfaff; --chrome-low: #a899b4;
  --chrome-dark: #6a5a78;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  width:100%; min-height:100%;
  background: linear-gradient(180deg, #b8dff0 0%, #f0d0e0 50%, #e8d8f8 100%);
  background-attachment: fixed;
  font-family:'Cormorant Garamond',serif;
  color: var(--ink);
  overflow-x: hidden;
}

/* --- ZIPPER OVERLAY (STATIONARY UNTIL SCROLLED) --- */
#zipper-wrapper {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100vh;
  z-index: 100;
  pointer-events: none;
}

.fp { 
  position: absolute; top: 0; height: 100%; width: 50%; 
  z-index: 10; pointer-events: all;
}
#fl { left: 0; background: linear-gradient(165deg, var(--blush-mid), var(--blush-deep)); border-right: 1px solid rgba(0,0,0,0.05); }
#fr { right: 0; background: linear-gradient(165deg, var(--blush-mid), var(--blush-deep)); }

/* Panel Content */
.panel-center {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  text-align: center; width: 80%;
}
.boutique-logo { width: 80px; height: 80px; border-radius: 20px; background: white; margin: 0 auto 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

/* Zipper Teeth & Pull */
#spine { position:absolute; left:50%; transform:translateX(-50%); z-index:12; width:4px; height:100%; background: var(--chrome-dark); opacity: 0.3; }
#tab {
  position:absolute; left:50%; transform:translateX(-50%); z-index:30;
  display:flex; flex-direction:column; align-items:center;
  filter:drop-shadow(0 5px 12px rgba(0,0,0,0.3));
}
.slider { width:33px; height:22px; background: var(--chrome-hi); border-radius:3px; }
.ring { width:26px; height:34px; border:4px solid var(--blush-deep); border-radius:5px 5px 10px 10px; }

#hint {
  position:absolute; bottom:2rem; left:50%; transform:translateX(-50%);
  font-family:'Dancing Script', cursive; font-size: 1.2rem; color: white;
}

/* --- CATALOG STYLES (RETAINED FROM ORIGINAL) --- */
#main-site { opacity: 0; padding-top: 2rem; }
header {
  position: sticky; top: 0; z-index: 40;
  background: rgba(253,250,255,.88); backdrop-filter: blur(14px);
  padding: .8rem 1.4rem; display: flex; align-items: center; gap: .75rem;
}
.catalog-header { text-align:center; padding: 4rem 0; }
.catalog-title { font-family:'Dancing Script',cursive; font-size: 4rem; }

/* Hanger Animations */
.hangers-row { display:flex; justify-content:space-around; padding: 2rem; }
.hanger-item {
  flex:1; max-width:140px; cursor:pointer;
  transition: transform .35s cubic-bezier(.23,1,.32,1);
  animation: sway 5s ease-in-out infinite;
}
@keyframes sway { 0%, 100% {transform:rotate(-2deg);} 50% {transform:rotate(2deg);} }
.hanger-item:hover { transform: scale(1.1); animation-play-state: paused; }

/* SVG Colors Classes */
.tb{fill:#d8eef8;}.ts{fill:#c4e0f0;}.tc{fill:#b8d8ec;}.td{stroke:rgba(42,26,46,.14);stroke-width:.9;fill:none;}.tn{fill:rgba(232,160,188,.7);}
.es{fill:#f0c8d8;}.eb{fill:#f8dce8;}.ep{fill:rgba(216,180,240,.3);}.ep2{fill:rgba(216,180,240,.15);}
.hb{fill:#f0d0e4;}.hpk{fill:#e8c4d8;stroke:rgba(42,26,46,.08);stroke-width:.7;}.hc{stroke:rgba(232,160,188,.6);stroke-width:1.3;fill:none;}.ht{fill:rgba(232,160,188,.65);}
</style>
</head>
<body>

<div id="zipper-wrapper">
  <div id="spine"></div>
  <div id="tab">
    <div class="slider"></div>
    <div class="ring"></div>
  </div>
  
  <div id="fl" class="fp">
    <div class="panel-center">
        <div class="boutique-logo"></div>
        <p style="color:white; font-family:'Nunito'; letter-spacing:3px;">KAT'S O-BOUTIQUE</p>
    </div>
  </div>
  
  <div id="fr" class="fp">
    <div class="panel-center">
        <p style="color:white; font-family:'Dancing Script'; font-size:1.8rem;">Est. 2020</p>
        <p style="color:white; font-family:'Nunito'; font-size:0.7rem; opacity:0.8;">ZAMBOANGA CITY</p>
    </div>
  </div>

  <div id="hint">Scroll to unzip ✨</div>
</div>

<div id="main-site">
    <header>
      <div style="font-family:'Dancing Script',cursive; font-size:1.5rem;">Kat's O-Boutique</div>
    </header>

    <div class="catalog-header">
      <span style="font-family:'Nunito'; letter-spacing:5px; font-size:0.7rem;">NEW ARRIVALS · 2025</span>
      <h1 class="catalog-title">Our Picks</h1>
    </div>

    <div class="hangers-row">
      <div class="hanger-item">
        <svg viewBox="0 0 108 148">
            <path class="ts" d="M28 18 L5 60 L22 68 L34 30 Z"/><path class="ts" d="M80 18 L103 60 L86 68 L74 30 Z"/>
            <path class="tb" d="M28 18 L20 148 L88 148 L80 18 Z"/>
            <path class="tc" d="M43 10 Q54 5 65 10 L69 20 Q54 15 39 20 Z"/>
            <circle class="tn" cx="54" cy="36" r="2.8"/><circle class="tn" cx="54" cy="52" r="2.8"/>
        </svg>
        <p style="text-align:center; font-family:'Nunito'; font-size:0.8rem; margin-top:10px;">LINEN OVERSHIRT<br><span style="color:var(--blush-deep)">₱ 2,890</span></p>
      </div>

      <div class="hanger-item" style="animation-delay: 0.5s;">
        <svg viewBox="0 0 108 142">
            <path class="es" d="M30 16 L6 52 L26 60 L36 28 Z"/><path class="es" d="M78 16 L102 52 L82 60 L72 28 Z"/>
            <path class="eb" d="M30 16 L22 142 L86 142 L78 16 Z"/>
            <rect class="ep" x="35" y="50" width="38" height="44" rx="2"/>
        </svg>
        <p style="text-align:center; font-family:'Nunito'; font-size:0.8rem; margin-top:10px;">GRAPHIC TEE<br><span style="color:var(--blush-deep)">₱ 1,290</span></p>
      </div>

      <div class="hanger-item" style="animation-delay: 1s;">
        <svg viewBox="0 0 108 162">
            <path class="hb" d="M26 28 L18 162 L90 162 L82 28 Z"/>
            <path class="hb" d="M26 28 L5 68 L22 78 L34 42 Z"/>
            <path class="hpk" d="M33 112 L33 142 Q54 147 75 142 L75 112 Q54 117 33 112 Z"/>
        </svg>
        <p style="text-align:center; font-family:'Nunito'; font-size:0.8rem; margin-top:10px;">ZIP HOODIE<br><span style="color:var(--blush-deep)">₱ 3,490</span></p>
      </div>
    </div>
</div>

<script>
    gsap.registerPlugin(ScrollTrigger);

    // ZIPPER SCROLL TIMELINE
    const zipTimeline = gsap.timeline({
        scrollTrigger: {
            trigger: "body",
            start: "top top",
            end: "+=1200", // Distance to scroll to finish unzipping
            scrub: 1,      // Link to scrollbar
            pin: true,     // Keep zipper on screen while unzipping
            onUpdate: (self) => {
                // Hide the hint once we start scrolling
                if (self.progress > 0.05) gsap.to("#hint", {opacity:0, duration:0.2});
                else gsap.to("#hint", {opacity:1, duration:0.2});
            }
        }
    });

    zipTimeline
        // Pull moves down
        .to("#tab", { y: "100vh", ease: "none" }, 0)
        // Left panel slides out
        .to("#fl", { x: "-100%", ease: "none" }, 0)
        // Right panel slides out
        .to("#fr", { x: "100%", ease: "none" }, 0)
        // Fade in the main site content slightly after the unzip starts
        .to("#main-site", { opacity: 1, ease: "none" }, 0.4);

</script>

</body>
</html>
